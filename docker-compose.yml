version: '3.7'

services:
  # 1. Veritabanımız (Okuma ve Yazma tablolarımız burada duracak)
  postgres:
    image: postgres:15
    container_name: paribu-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: paribu_db
    ports:
      - "5432:5432"

  # 2. Mesaj Kuyruğumuz 
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.1.2
    container_name: paribu-redpanda
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"

  # 3. Redpanda Arayüzü mesajları görebilmemiz için panel
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.2.4
    container_name: paribu-redpanda-console
    entrypoint: /app/console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    depends_on:
      - redpanda